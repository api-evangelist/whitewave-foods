aid: whitewave-foods
name: WhiteWave Foods
description: >-
  The WhiteWave Foods Company was a consumer packaged food and beverage company
  headquartered in Denver, Colorado. It offered plant-based foods and beverages,
  coffee creamers, dairy, and organic produce under brands including Silk, So Delicious,
  Horizon Organic, International Delight, LAND O LAKES, Vega, Wallaby Organic, and
  Earthbound Farm. WhiteWave was acquired by Danone in April 2017 and is now part of
  Danone North America.
